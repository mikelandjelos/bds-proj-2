services:
  kafka:
    image: apache/kafka:4.3.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 24
      start_period: 20s
    networks:
      - bds-mobility-net

  kafka-init:
    image: apache/kafka:4.3.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        for topic in mobility.fcd mobility.emissions analytics.traffic analytics.pollution; do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:19092 \
            --create \
            --if-not-exists \
            --partitions 3 \
            --replication-factor 1 \
            --topic "$$topic"
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list
    restart: "no"
    networks:
      - bds-mobility-net

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    profiles: ["spark"]
    environment:
      INIT_DAEMON_STEP: setup_spark
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./data/reference:/opt/bds/data/reference:ro
    networks:
      - bds-mobility-net

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    profiles: ["spark"]
    depends_on:
      - spark-master
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_CORES: 8
    ports:
      - "8081:8081"
    volumes:
      - ./data/reference:/opt/bds/data/reference:ro
    networks:
      - bds-mobility-net

  flink-master:
    image: bde2020/flink-master:1.14.5-hadoop3.2
    profiles: ["flink"]
    ports:
      - "8082:8080"
    volumes:
      - ./data/reference:/opt/bds/data/reference:ro
    networks:
      - bds-mobility-net

  flink-worker-1:
    image: bde2020/flink-worker:1.14.5-hadoop3.2
    profiles: ["flink"]
    depends_on:
      - flink-master
    environment:
      FLINK_MASTER_PORT_6123_TCP_ADDR: flink-master
      FLINK_NUM_TASK_SLOTS: 8
    volumes:
      - ./data/reference:/opt/bds/data/reference:ro
    networks:
      - bds-mobility-net

networks:
  bds-mobility-net:
    name: bds-mobility-net
